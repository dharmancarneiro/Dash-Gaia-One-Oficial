<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0f0ee;color:#1a1a18;font-size:13px}
.w{max-width:1200px;margin:0 auto;padding:14px}

<script>

/* ═══════════════════════════════════════════════════════
   GAIA ONE — LIVE DASHBOARD
   Fonte: Supabase (guru_subscriptions) — tempo real
   Auto-refresh: 5 minutos
═══════════════════════════════════════════════════════ */

const SB_URL = "https://txifgjgvggphdjtijffg.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4aWZnamd2Z2dwaGRqdGlqZmZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NjgzNjUsImV4cCI6MjA5NjU0NDM2NX0.PhIbnnv0HY6lWWc-FM4eTpmHdYJMRWFtOFizAa3E7wY";
const MONTHS = ["2026-02","2026-03","2026-04","2026-05","2026-06"];
const PAGE_SIZE = 1000;

/* ── FETCHING ── */
async function fetchAllSubs() {
  const cols = "last_status,charged_times,charged_every_days,trial_started_at,trial_finished_at,date_started_at,product_offer_name,next_cycle_value,cancel_reason";
  const base = `${SB_URL}/rest/v1/guru_subscriptions?select=${cols}&apikey=${SB_KEY}&order=row_id.asc&limit=${PAGE_SIZE}`;
  let all = [], offset = 0, keepGoing = true;
  while (keepGoing) {
    const res = await fetch(`${base}&offset=${offset}`);
    if (!res.ok) throw new Error("HTTP " + res.status + " ao buscar dados");
    const batch = await res.json();
    if (!Array.isArray(batch) || batch.length === 0) break;
    all = all.concat(batch);
    updateLoading("Carregando... " + all.length + " registros");
    if (batch.length < PAGE_SIZE) keepGoing = false;
    else offset += batch.length;
  }
  return all;
}

/* ── NORMALIZAÇÃO ── */
function getCanal(offerName) {
  if (!offerName) return "Gaia One";
  const u = offerName.toUpperCase();
  if (u.includes("PROTAGON"))     return "Protagon";
  if (u.includes("WORKSHOP"))     return "Workshop";
  if (u.includes("SPRINT"))       return "Sprint Digital";
  if (u.includes("5 LIBERDADES") || u.includes("5LIB") || u.includes("5 LIB")) return "5 Liberdades";
  if (u.includes("ALUNO"))        return "Alunos";
  if (u.includes("UPSELL"))       return "Upsell";
  return "Gaia One";
}

function getProduto(offerName, plano) {
  if (!offerName) return plano === "Anual" ? "Anual" : "Base";
  const u = offerName.toUpperCase();
  const canal = getCanal(offerName);
  if (canal === "Gaia One") return plano === "Anual" ? "Anual" : "Base";
  return plano + " - " + canal;
}

function normSub(r) {
  const plano = r.charged_every_days === 365 ? "Anual" : "Mensal";
  const cobr  = parseInt(r.charged_times) || 0;
  const val   = parseFloat(r.next_cycle_value) || 0;
  const mesIni  = r.date_started_at  ? r.date_started_at.substring(0,7)  : null;
  const mesTrial= r.trial_started_at ? r.trial_started_at.substring(0,7) : null;
  const canal   = getCanal(r.product_offer_name);
  const produto = getProduto(r.product_offer_name, plano);
  return { ...r, plano, cobr, val, mesIni, mesTrial, canal, produto, temTrial: !!r.trial_started_at };
}

/* ── PROCESSAMENTO ── */
function processData(rawSubs) {
  const subs = rawSubs.map(normSub);

  const ativas   = subs.filter(r => r.last_status === "active");
  const trials   = subs.filter(r => r.last_status === "trial");
  const cancels  = subs.filter(r => r.last_status === "canceled");
  const inativas = subs.filter(r => r.last_status === "inactive");

  const mens  = ativas.filter(r => r.plano === "Mensal");
  const anual = ativas.filter(r => r.plano === "Anual");

  const mrr_men   = mens.reduce((a,r)  => a + r.val, 0);
  const mrr_cobr2 = mens.filter(r => r.cobr >= 2).reduce((a,r) => a + r.val, 0);
  const arr_cont  = anual.reduce((a,r) => a + r.val, 0);
  const arr_real  = mrr_men * 12 + arr_cont;

  // Churn real: canceled + cobr >= 2
  const churnReal = cancels.filter(r => r.cobr >= 2);
  const churnRate = churnReal.length > 0
    ? Math.round(churnReal.length / (churnReal.length + ativas.length) * 1000) / 10
    : 0;

  // Conversão: ativas que tiveram trial
  const ativasComTrial = ativas.filter(r => r.temTrial);

  // ── BY MONTH ──
  const by_month = {};
  const evolution = [];

  MONTHS.forEach(m => {
    const eom       = ativas.filter(r => r.mesIni && r.mesIni <= m).length;
    const tri_m     = trials.filter(r => r.mesTrial === m);
    const conv_m    = ativasComTrial.filter(r => r.mesIni === m);
    const churn_m   = churnReal.filter(r => r.mesIni === m);
    const novas_m   = ativas.filter(r => r.mesIni === m && !r.temTrial);
    const anu_m     = ativas.filter(r => r.mesIni === m && r.plano === "Anual");

    // Renovações: ativas cobr>=2 que começaram neste mês (proxy)
    const renov_m   = ativas.filter(r => r.mesIni === m && r.cobr >= 2);

    // Trial expiry do mês
    const texp_map = {};
    tri_m.forEach(r => {
      if (r.trial_finished_at) {
        const d = r.trial_finished_at.substring(0,10);
        if (!texp_map[d]) texp_map[d] = {};
        texp_map[d][r.produto] = (texp_map[d][r.produto] || 0) + 1;
      }
    });
    const trial_expiry = Object.entries(texp_map).sort((a,b) => a[0]>b[0]?1:-1).map(([d,v]) => ({
      data: d, total: Object.values(v).reduce((a,b)=>a+b,0),
      est: Math.max(1, Math.round(Object.values(v).reduce((a,b)=>a+b,0) * 0.40)),
      por_produto: Object.entries(v).sort((a,b)=>b[1]-a[1]).map(([p,q])=>({produto:p,qtd:q}))
    }));

    const trial_rank = Object.entries(
      tri_m.reduce((acc,r) => { const k=r.produto+"||"+r.plano; acc[k]=(acc[k]||0)+1; return acc; },{})
    ).sort((a,b)=>b[1]-a[1]).map(([k,t])=>{const[produto,plano]=k.split("||");return{produto,plano,trials:t};});

    by_month[m] = {
      eom, trials: tri_m.length, churn: churn_m.length,
      novas: novas_m.length, men: novas_m.length,
      anu: anu_m.length, renov: renov_m.length,
      // Receita: não disponível sem tabela de vendas
      receita: 0, mrr: 0,
      rec_nova_men: 0, rec_nova_anu: 0,
      meta: null, meta_pct: null,
      trial_expiry, trial_rank,
      by_product: [], churn_rank: [], churn_detail: [],
      daily: [], daily_trials: [], calendar: [],
      has_trials: tri_m.length > 0,
      utm: { por_canal: [], total: 0, com_utm: 0, sem_utm: 0, pct_utm: 0 }
    };
    evolution.push({ mes: m, eom, trials: tri_m.length, churn: churn_m.length,
      novas: novas_m.length, men: novas_m.length, anu: anu_m.length,
      renov: renov_m.length, receita: 0, mrr: 0 });
  });

  // ── ACTIVE NOW by product ──
  const prod_active = {};
  ativas.forEach(r => {
    const k = r.produto;
    if (!prod_active[k]) prod_active[k] = {subs:0,mrr:0,ticket_sum:0,plano:r.plano,cobr2:0};
    prod_active[k].subs++;
    if (r.plano==="Mensal") prod_active[k].mrr = (prod_active[k].mrr||0) + r.val;
    prod_active[k].ticket_sum += r.val;
    if (r.cobr >= 2) prod_active[k].cobr2++;
  });
  const ap_list = Object.entries(prod_active).sort((a,b)=>b[1].subs-a[1].subs).map(([k,v]) => ({
    produto:k, pnorm:k, plano:v.plano, subs:v.subs, mrr:Math.round(v.mrr*100)/100,
    cobr2:v.cobr2, ticket: v.subs > 0 ? Math.round(v.ticket_sum/v.subs*100)/100 : 0,
    pct_mrr: mrr_men > 0 ? Math.round(v.mrr/mrr_men*1000)/10 : 0
  }));

  // ── TRIAL by product ──
  const trial_prod = {};
  trials.forEach(r => {
    const k = r.produto;
    if (!trial_prod[k]) trial_prod[k] = {trials:0,plano:r.plano};
    trial_prod[k].trials++;
  });
  const tp_list = Object.entries(trial_prod).sort((a,b)=>b[1].trials-a[1].trials).map(([k,v]) => {
    const act = (prod_active[k]||{}).subs || 0;
    return { produto:k, pnorm:k, plano:v.plano, trials:v.trials,
      conv_rate: (v.trials+act)>0 ? Math.round(act/(v.trials+act)*1000)/10 : 0 };
  });

  // ── CHURN GLOBAL by product ──
  const churn_by_prod = {};
  churnReal.forEach(r => {
    const k = r.produto+"||"+r.plano;
    if (!churn_by_prod[k]) churn_by_prod[k] = {produto:r.produto,plano:r.plano,churn:0};
    churn_by_prod[k].churn++;
  });
  const churn_global = Object.values(churn_by_prod).sort((a,b)=>b.churn-a.churn).map(v => {
    const act = (prod_active[v.produto]||{}).subs || 0;
    const tot = act + v.churn;
    return { produto_curto:v.produto, produto:v.produto, plano:v.plano,
      ativas:act, churn:v.churn, total_ever:tot,
      churn_rate: tot>0 ? Math.round(v.churn/tot*1000)/10 : 0 };
  });

  // ── CONVERSÃO por produto ──
  const conv_all = {};
  [...ativasComTrial, ...trials].forEach(r => {
    const k = r.produto+"||"+r.plano;
    if (!conv_all[k]) conv_all[k] = {produto:r.produto,plano:r.plano,conv:0,trial:0};
    if (r.last_status==="active") conv_all[k].conv++;
    else conv_all[k].trial++;
  });
  const conv_por_produto = Object.values(conv_all).sort((a,b)=>(b.conv+b.trial)-(a.conv+a.trial)).map(v => {
    const total = v.conv + v.trial;
    return { produto:v.produto, plano:v.plano, total, conv:v.conv, ativa:v.conv,
      trial:v.trial, atrasada:0, nunca_pagou:0, pagou_1x:0, ciclo_fechado:total,
      conv_rate: total>0 ? Math.round(v.conv/total*1000)/10 : 0 };
  });

  // ── CONV mês a mês ──
  const conv_por_mes = MONTHS.map(m => {
    const tri_m  = trials.filter(r => r.mesTrial === m);
    const conv_m = ativasComTrial.filter(r => r.mesIni === m);
    const prod_map = {};
    tri_m.forEach(r  => { if(!prod_map[r.produto]) prod_map[r.produto]={produto:r.produto,plano:r.plano,trial_ativo:0,converteu:0}; prod_map[r.produto].trial_ativo++; });
    conv_m.forEach(r => { if(!prod_map[r.produto]) prod_map[r.produto]={produto:r.produto,plano:r.plano,trial_ativo:0,converteu:0}; prod_map[r.produto].converteu++; });
    const por_produto = Object.values(prod_map).sort((a,b)=>(b.trial_ativo+b.converteu)-(a.trial_ativo+a.converteu)).map(v => {
      const total = v.trial_ativo + v.converteu;
      return {...v, total_cohort:total, conv_rate: total>0?Math.round(v.converteu/total*1000)/10:0};
    });
    return { mes:m, total_trial_ativo:tri_m.length, total_converteu:conv_m.length, por_produto };
  });

  // ── UTM (via canal derivado do produto) ──
  const canal_map = {};
  ativas.forEach(r => {
    if (!canal_map[r.canal]) canal_map[r.canal] = {canal:r.canal,canal_grupo:r.canal,vendas:0,receita:0};
    canal_map[r.canal].vendas++;
  });
  const utm_global = {
    por_canal: Object.values(canal_map).sort((a,b)=>b.vendas-a.vendas),
    total: ativas.length, com_utm: ativas.filter(r=>r.canal!=="Gaia One").length,
    sem_utm: ativas.filter(r=>r.canal==="Gaia One").length,
    pct_utm: ativas.length > 0 ? Math.round(ativas.filter(r=>r.canal!=="Gaia One").length/ativas.length*100) : 0
  };

  const utm_by_month = {};
  MONTHS.forEach(m => {
    const a_m = ativas.filter(r => r.mesIni === m);
    const cmap = {};
    a_m.forEach(r => { if(!cmap[r.canal]) cmap[r.canal]={canal:r.canal,canal_grupo:r.canal,vendas:0,receita:0}; cmap[r.canal].vendas++; });
    utm_by_month[m] = { por_canal: Object.values(cmap).sort((a,b)=>b.vendas-a.vendas),
      total:a_m.length, com_utm:a_m.filter(r=>r.canal!=="Gaia One").length,
      sem_utm:a_m.filter(r=>r.canal==="Gaia One").length,
      pct_utm:a_m.length>0?Math.round(a_m.filter(r=>r.canal!=="Gaia One").length/a_m.length*100):0 };
  });

  // ── RENOV por produto ──
  const renov_prod = {};
  ativas.filter(r=>r.cobr>=2).forEach(r=>{ renov_prod[r.produto]=(renov_prod[r.produto]||0)+1; });
  const renov_list = Object.entries(renov_prod).sort((a,b)=>b[1]-a[1]).map(([p,v])=>{
    const pl = (prod_active[p]||{}).plano || "Mensal";
    return {pnorm:p,produto:p,plano:pl,renovacoes:v};
  });
  const renov_mes = MONTHS.map(m=>{return{mes:m,renovacoes:by_month[m].renov};});

  // ── TRIALS MAI DETAIL (compatibilidade) ──
  const trials_mai_detail = {
    total: conv_por_produto.reduce((a,r)=>a+r.total,0),
    converteram: ativasComTrial.length,
    nao_converteram: trials.length,
    protagon_total: conv_por_produto.filter(r=>r.produto.includes("Protagon")).reduce((a,r)=>a+r.total,0),
    protagon_conv: conv_por_produto.filter(r=>r.produto.includes("Protagon")).reduce((a,r)=>a+r.conv,0),
    protagon_nao_conv: conv_por_produto.filter(r=>r.produto.includes("Protagon")).reduce((a,r)=>a+r.trial,0),
    por_produto: conv_por_produto,
    conv_por_produto,
    trials_jun_total: by_month["2026-06"] ? by_month["2026-06"].trials : 0,
    trials_jun_por_produto: by_month["2026-06"] ? by_month["2026-06"].trial_rank : []
  };

  // ── Monta D ──
  const D_obj = {
    months: MONTHS,
    by_month,
    totals: {
      eom: ativas.length, trials: trials.length, churn: churnReal.length,
      novas: ativas.filter(r=>!r.temTrial).length,
      men: ativas.filter(r=>r.plano==="Mensal"&&!r.temTrial).length,
      anu: ativas.filter(r=>r.plano==="Anual").length,
      renov: ativas.filter(r=>r.cobr>=2).length,
      receita: 0, mrr: 0, meta: null, meta_pct: null,
      rec_nova_men: 0, rec_nova_anu: 0, receita_nova: 0,
      by_product: ap_list, churn_rank: churn_global, churn_detail: churn_global,
      trial_expiry: [], trial_rank: tp_list,
      daily: [], daily_trials: [], calendar: [], has_trials: trials.length > 0,
      utm: utm_global
    },
    evolution,
    active_now: {
      total: ativas.length, total_atr: inativas.length,
      mensal: mens.length, anual: anual.length,
      mrr: Math.round(mrr_men*100)/100,
      mrr_men: Math.round(mrr_men*100)/100,
      mrr_cobr2: Math.round(mrr_cobr2*100)/100,
      mrr_anu: 0,
      arr: Math.round(arr_real*100)/100,
      trials_total: trials.length,
      trials_protagon: trials.filter(r=>r.canal==="Protagon").length,
      trials_alunos: trials.filter(r=>r.canal==="Alunos").length,
      by_product: ap_list, trial_prod_rank: tp_list, trial_expiry: []
    },
    churn_detail: {global: churn_global},
    churn_detail_global: churn_global,
    trial_expiry_all: [],
    drill: {
      ativas_por_produto: ap_list, trial_por_produto: tp_list,
      renov_por_produto: renov_list, renov_por_mes: renov_mes,
      mrr_base: Math.round(mrr_men*100)/100,
      arr_real: Math.round(arr_real*100)/100,
      mrr_mensal: Math.round(mrr_men*100)/100,
      mrr_cobr2: Math.round(mrr_cobr2*100)/100,
      arr_contratos: Math.round(arr_cont*100)/100,
      subs_mensal: mens.length, subs_anual: anual.length,
      subs_cobr2: mens.filter(r=>r.cobr>=2).length,
      total_renov: ativas.filter(r=>r.cobr>=2).length,
      trials_mai_detail
    },
    trials_mai_detail
  };

  const MRR_BK_obj = {
    mrr_base: Math.round(mrr_men*100)/100,
    arr_real: Math.round(arr_real*100)/100,
    mrr_cobr2: Math.round(mrr_cobr2*100)/100,
    subs_mensal: mens.length, subs_anual: anual.length,
    subs_cobr2: mens.filter(r=>r.cobr>=2).length,
    mrr_mensal: Math.round(mrr_men*100)/100,
    mrr_anual: 0,
    arr_contratos: Math.round(arr_cont*100)/100,
    by_month: Object.fromEntries(MONTHS.map(m => [m, {
      mrr_total: 0, mrr_r1_men: 0, mrr_r1_anu: 0, mrr_r2: 0, mrr_r3: 0,
      rec_nova_men: 0, rec_nova_anu: 0, rec_total: 0,
      n_renov: by_month[m].renov, n_novas_men: by_month[m].novas, n_anu_d30: by_month[m].anu
    }]))
  };

  const FIN_obj = {
    mrr_base: Math.round(mrr_men*100)/100,
    arr_real: Math.round(arr_real*100)/100,
    mrr_cobr2: Math.round(mrr_cobr2*100)/100,
    arr_contratos: Math.round(arr_cont*100)/100,
    caixa_por_mes: Object.fromEntries(MONTHS.map(m => [m, {
      mes: m, rec_pix_d0: 0, rec_cartao_d30: 0, mrr_total: 0,
      mrr_r1_men: 0, mrr_r1_anu: 0, mrr_r2: 0, mrr_r3: 0,
      rec_novas_men: 0, rec_novas_anu: 0, rec_total: 0, n_total: 0
    }])),
    projecao: {
      junho: {label:"Jun/26", confirmado:0, mrr_recorrente:Math.round(mrr_men*100)/100, total_projetado:Math.round(mrr_men*100)/100},
      julho: {label:"Jul/26", mrr_recorrente:Math.round(mrr_men*100)/100, anuais_d30_jun:0, n_anuais_jun:0, total_projetado:Math.round(mrr_men*100)/100}
    }
  };

  const CONV_DATA_obj = {
    por_produto: conv_por_produto,
    por_mes: conv_por_mes,
    resumo: {
      total_entraram_trial: ativasComTrial.length + trials.length,
      total_converteram: ativasComTrial.length,
      total_ainda_trial: trials.length,
      conv_rate_global: (ativasComTrial.length + trials.length) > 0
        ? Math.round(ativasComTrial.length / (ativasComTrial.length + trials.length) * 1000) / 10
        : 0
    }
  };

  const UTM_DATA_obj = { global: utm_global, by_month: utm_by_month };

  return {
    D: D_obj, MRR_BK: MRR_BK_obj, FIN: FIN_obj,
    CONV_DATA: CONV_DATA_obj, UTM_DATA: UTM_DATA_obj,
    churn_total: churnReal.length,
    churn_rate: churnRate,
    trials_total: trials.length,
    mrr_men: Math.round(mrr_men*100)/100,
    mrr_cobr2: Math.round(mrr_cobr2*100)/100,
    arr_contratos: Math.round(arr_cont*100)/100,
    subs
  };
}

/* ── INIT & AUTO-REFRESH ── */
async function loadAndRender() {
  showLoading(true);
  updateLoading("Conectando ao banco de dados...");
  try {
    const rawSubs = await fetchAllSubs();
    updateLoading("Processando dados...");
    const data = processData(rawSubs);
    renderDashboard(data);
    showLoading(false);
  } catch(err) {
    console.error("Erro Supabase:", err);
    showError(err.message);
  }
}

document.addEventListener("DOMContentLoaded", () => {
  loadAndRender();
  // Auto-refresh a cada 5 minutos
  setInterval(() => {
    loadAndRender();
  }, 5 * 60 * 1000);
});


var ML={"2026-02":"Fev/26","2026-03":"Mar/26","2026-04":"Abr/26","2026-05":"Mai/26","2026-06":"Jun/26"};
var months=["2026-02","2026-03","2026-04","2026-05","2026-06"];
var curM="2026-06", curO="painel", curCard=null;

function num(n){return new Intl.NumberFormat("pt-BR").format(Math.round(n||0));}
function fF(n){return "R$ "+new Intl.NumberFormat("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0);}
function fR(n){
  n=n||0;
  if(n>=1000000) return "R$"+new Intl.NumberFormat("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:1}).format(n/1000000)+"M";
  if(n>=1000) return "R$"+new Intl.NumberFormat("pt-BR",{minimumFractionDigits:0,maximumFractionDigits:1}).format(n/1000)+"k";
  return fF(n);
}
function bar(v,mx,color){
  var pct=mx>0?Math.round(v/mx*100):0;
  return "<div class='bbg'><div class='bbf' style='width:"+pct+"%;background:"+color+"'></div></div>";
}
function plB(p){
  return p==="Anual"?"<span class='bd b-bl'>Anual</span>":"<span class='bd b-gr'>Mensal</span>";
}
function gD(){return curM==="all"?D.totals:(D.by_month[curM]||D.totals);}

// Event delegation for selectors
document.addEventListener("click", function(e){
  var btn = e.target.closest("button.sb");
  if(!btn) return;
  var type = btn.getAttribute("data-type");
  var val = btn.getAttribute("data-val");
  if(!type || !val) return;
  sel(type, val, btn);
});

// Event delegation for kpi cards
document.addEventListener("click", function(e){
  var kc = e.target.closest(".kcard");
  if(!kc) return;
  var id = kc.getAttribute("data-card");
  if(id) clickCard(id);

function sel(type, val, btn){
  if(type==="m"){
    curM=val;
    document.querySelectorAll(".sg:first-of-type .sb").forEach(function(b){b.classList.remove("on");});
  } else {
    curO=val;
    document.querySelectorAll(".sg:last-of-type .sb").forEach(function(b){b.classList.remove("on");});
  }
  btn.classList.add("on");
  curCard=null;
  document.getElementById("drill-panel").style.display="none";
  document.querySelectorAll(".kcard").forEach(function(k){k.classList.remove("active");});
  var d=gD();
  var mLbl=curM==="all"?"Historico":(ML[curM]||curM);
  var oLbls={painel:"Painel",subs:"Assinaturas",trials:"Trials",churn:"Churn",financeiro:"Receita",canais:"Canais"};
  document.getElementById("ctx-h2").textContent=(oLbls[curO]||"Painel")+" - "+mLbl;
  document.getElementById("ctx-sub").textContent=curM==="all"?"Fev a Jun 2026 - todos os dados":mLbl+" - Digital Manager Guru";

  buildMain(d);

function clickCard(id){
  if(curCard===id){
    curCard=null;
    document.getElementById("drill-panel").style.display="none";
    var el=document.querySelector(".kcard[data-card='"+id+"']");
    if(el) el.classList.remove("active");
    return;
  }
  if(curCard){
    var prev=document.querySelector(".kcard[data-card='"+curCard+"']");
    if(prev) prev.classList.remove("active");
  }
  curCard=id;
  var kc=document.querySelector(".kcard[data-card='"+id+"']");
  if(kc) kc.classList.add("active");
  var dp=document.getElementById("drill-panel");
  dp.style.display="block";
  dp.innerHTML="<div class='dpanel'>"+getDrill(id)+"</div>";
}

  if(curCard){var el=document.querySelector(".kcard[data-card='"+curCard+"']"); if(el) el.classList.remove("active");}

}

        +"<td><b>"+(r.canal||"-")+"</b></td>"
        +"<td style='font-size:10px;color:#a0aec0'>"+(r.canal_grupo||"-")+"</td>"
        +"<td><b>"+num(r.vendas||0)+"</b></td>"
        +"<td>"+(totU>0?Math.round((r.vendas||0)/totU*100):0)+"%</td>"
        +"<td>"+fF(r.receita||0)+"</td></tr>";
    }).join("");
    var evoRows=months.map(function(m){
      var bm=UTM_DATA.by_month[m]||{por_canal:[],total:0,sem_utm:0};
      var pc=bm.por_canal||[];
      function cv(c){var r=pc.find(function(r){return r.canal===c;}); return r?{v:r.vendas||0,r:r.receita||0}:{v:0,r:0};}
      function col(o){return o.v?"<b>"+o.v+"</b><br><small style='color:#a0aec0'>"+fR(o.r)+"</small>":"-";}
      var tot2=bm.total||0; var isCur=m===curM;
      var prot=cv("Protagon"),work=cv("Workshop"),alun=cv("Alunos"),spr=cv("Sprint Digital"),lib5=cv("5 Liberdades"),gaiaone=cv("Gaia One");
      var comUtm=tot2-(gaiaone.v+cv("Sem UTM").v);
      return "<tr style='"+(isCur?"background:#f0f6ff;font-weight:600":"")+"'>"
        +"<td><b>"+(ML[m]||m)+"</b></td><td>"+tot2+"</td>"
        +"<td style='color:#3266ad'>"+col(prot)+"</td>"
        +"<td style='color:#1a6b38'>"+col(work)+"</td>"
        +"<td style='color:#854f0b'>"+col(alun)+"</td>"
        +"<td>"+col(spr)+"</td><td>"+col(lib5)+"</td>"
        +"<td style='color:#555'>"+col(gaiaone)+"</td>"
        +"<td>"+(tot2>0?Math.round(comUtm/tot2*100):0)+"%</td></tr>";
    }).join("");
    mc.innerHTML=
      "<div class='info "+(pctU>=50?"ibl":"iamb")+"'><b>Cobertura UTM:</b> "+num(totU-semU)+" de "+num(totU)+" vendas rastreadas ("+pctU+"%). "+num(semU)+" sem UTM.</div>"
      +"<div class='two'>"
      +"<div class='card'><div class='ct'>Vendas por grupo de canal</div>"+barHtml+"</div>"
      +"<div class='card'><div class='ct'>Detalhe por UTM source</div>"
      +"<table class='tbl'><thead><tr><th scope='col'>#</th><th scope='col'>Canal</th><th scope='col'>Grupo</th><th scope='col'>Vendas</th><th scope='col'>%</th><th scope='col'>Receita</th></tr></thead><tbody>"+detRows+"</tbody></table></div>"
      +"</div>"
      +"<div class='card'><div class='ct'>Evolucao por canal mes a mes</div>"
      +"<table class='tbl' style='font-size:11px'><thead><tr>"
      +"<th scope='col'>Mês</th><th scope='col'>Total</th><th scope='col' style='color:#3266ad'>Protagon</th><th scope='col' style='color:green'>Workshop</th><th scope='col' style='color:#854f0b'>Alunos</th><th scope='col'>Sprint</th><th scope='col'>5 Lib.</th><th scope='col'>Gaia One</th><th scope='col'>% Rastr.</th>"
      +"</tr></thead><tbody>"+evoRows+"</tbody></table></div>";
    return;
  }
}



</script>
